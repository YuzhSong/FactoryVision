components:
  schemas:
    AIResultPlaceholder:
      type: object
      properties:
        module:
          type: string
          default: ai_results
        status:
          type: string
          default: placeholder
    AIResultReport:
      type: object
      properties:
        cameraId:
          type: string
        frameId:
          type: string
          default: ''
        timestamp:
          type: string
          format: date-time
        results:
          type: array
          items:
            type: object
            additionalProperties: {}
        eventMedia:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - cameraId
      - results
      - timestamp
    Alert:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          readOnly: true
        eventType:
          type: string
        severity:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/Status65dEnum'
          readOnly: true
        cameraId:
          type: integer
          nullable: true
        cameraName:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
        description:
          type: string
          readOnly: true
      required:
      - cameraId
      - cameraName
      - description
      - eventType
      - id
      - occurredAt
      - severity
      - status
      - title
    AlertDetail:
      type: object
      properties:
        alert:
          type: object
          additionalProperties: {}
        event:
          type: object
          additionalProperties: {}
        replay:
          type: object
          additionalProperties: {}
      required:
      - alert
      - event
      - replay
    AlertHandle:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/Status65dEnum'
      required:
      - status
    AttendancePlaceholder:
      type: object
      properties:
        module:
          type: string
          default: attendance
        status:
          type: string
          default: placeholder
    CameraCreate:
      type: object
      description: 创建摄像头——参数校验。
      properties:
        name:
          type: string
          maxLength: 128
        code:
          type: string
          default: ''
          maxLength: 64
        streamUrl:
          type: string
          maxLength: 512
        processedStreamUrl:
          type: string
          default: ''
          maxLength: 512
        location:
          type: string
          default: ''
          maxLength: 255
        includeFaces:
          type: boolean
          default: false
      required:
      - name
      - streamUrl
    CameraList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        code:
          type: string
          readOnly: true
        cameraId:
          type: string
        streamUrl:
          type: string
        processedStreamUrl:
          type: string
        location:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/CameraListStatusEnum'
          readOnly: true
        enabled:
          type: boolean
          readOnly: true
        includeFaces:
          type: boolean
        streamConfig:
          type: string
          readOnly: true
      required:
      - cameraId
      - code
      - enabled
      - id
      - includeFaces
      - location
      - name
      - processedStreamUrl
      - status
      - streamConfig
      - streamUrl
    CameraListStatusEnum:
      enum:
      - online
      - offline
      - disabled
      type: string
      description: |-
        * `online` - Online
        * `offline` - Offline
        * `disabled` - Disabled
    CameraPlaceholder:
      type: object
      properties:
        module:
          type: string
          default: cameras
        status:
          type: string
          default: placeholder
    CameraToggle:
      type: object
      description: 切换摄像头状态。
      properties:
        status:
          $ref: '#/components/schemas/CameraToggleStatusEnum'
      required:
      - status
    CameraToggleStatusEnum:
      enum:
      - online
      - offline
      - disabled
      type: string
      description: |-
        * `online` - online
        * `offline` - offline
        * `disabled` - disabled
    CameraUpdate:
      type: object
      description: 编辑摄像头——所有字段可选，不传保持原值。
      properties:
        name:
          type: string
          maxLength: 128
        code:
          type: string
          maxLength: 64
        streamUrl:
          type: string
          maxLength: 512
        processedStreamUrl:
          type: string
          maxLength: 512
        location:
          type: string
          maxLength: 255
        enabled:
          type: boolean
        includeFaces:
          type: boolean
    DashboardSummary:
      type: object
      properties:
        cameraCount:
          type: integer
        onlineCameraCount:
          type: integer
        employeeCount:
          type: integer
        todayEventCount:
          type: integer
        todayAlertCount:
          type: integer
        pendingAlertCount:
          type: integer
        recentAlerts:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        eventTrend:
          type: array
          items:
            $ref: '#/components/schemas/EventTrend'
      required:
      - cameraCount
      - employeeCount
      - eventTrend
      - onlineCameraCount
      - pendingAlertCount
      - recentAlerts
      - todayAlertCount
      - todayEventCount
    EmployeeCreate:
      type: object
      description: 创建员工——参数校验。
      properties:
        employeeNo:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 64
        department:
          type: string
          default: ''
          maxLength: 128
        position:
          type: string
          default: ''
          maxLength: 128
        phone:
          type: string
          default: ''
          maxLength: 32
      required:
      - employeeNo
      - name
    EmployeeList:
      type: object
      description: 员工列表输出。
      properties:
        id:
          type: integer
          readOnly: true
        employeeNo:
          type: string
        name:
          type: string
          readOnly: true
          title: 姓名
        department:
          type: string
          readOnly: true
          title: 部门
        position:
          type: string
          readOnly: true
          title: 岗位
        phone:
          type: string
          readOnly: true
          title: 手机号
        status:
          allOf:
          - $ref: '#/components/schemas/EmployeeListStatusEnum'
          readOnly: true
          title: 状态
      required:
      - department
      - employeeNo
      - id
      - name
      - phone
      - position
      - status
    EmployeeListStatusEnum:
      enum:
      - active
      - inactive
      type: string
      description: |-
        * `active` - 在职
        * `inactive` - 停用
    EmployeePlaceholder:
      type: object
      description: 保留原占位序列化器，供占位接口使用。
      properties:
        module:
          type: string
          default: employees
        status:
          type: string
          default: placeholder
    EmployeeUpdate:
      type: object
      description: 编辑员工——所有字段可选。
      properties:
        employeeNo:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 64
        department:
          type: string
          maxLength: 128
        position:
          type: string
          maxLength: 128
        phone:
          type: string
          maxLength: 32
        status:
          $ref: '#/components/schemas/EmployeeUpdateStatusEnum'
    EmployeeUpdateStatusEnum:
      enum:
      - active
      - inactive
      type: string
      description: |-
        * `active` - active
        * `inactive` - inactive
    EventList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        cameraId:
          type: integer
          nullable: true
        cameraIdentifier:
          type: string
        event_type:
          type: string
          readOnly: true
        source:
          allOf:
          - $ref: '#/components/schemas/SourceEnum'
          readOnly: true
        severity:
          allOf:
          - $ref: '#/components/schemas/SeverityEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/EventListStatusEnum'
          readOnly: true
        occurred_at:
          type: string
          format: date-time
          readOnly: true
        frameId:
          type: string
        trackId:
          type: string
        bbox:
          readOnly: true
        confidence:
          type: number
          format: double
          readOnly: true
          nullable: true
        snapshotPath:
          type: string
        payload:
          readOnly: true
      required:
      - bbox
      - cameraId
      - cameraIdentifier
      - confidence
      - event_type
      - frameId
      - id
      - occurred_at
      - payload
      - severity
      - snapshotPath
      - source
      - status
      - trackId
    EventListStatusEnum:
      enum:
      - new
      - processing
      - closed
      type: string
      description: |-
        * `new` - New
        * `processing` - Processing
        * `closed` - Closed
    EventMediaUpload:
      type: object
      properties:
        mediaEventId:
          type: string
        status:
          type: string
        keyframe:
          type: string
          format: uri
        clip:
          type: string
          format: uri
        manifest:
          type: string
          format: uri
    EventPlaceholder:
      type: object
      properties:
        module:
          type: string
          default: events
        status:
          type: string
          default: placeholder
    EventTrend:
      type: object
      properties:
        hour:
          type: string
          format: date-time
        count:
          type: integer
      required:
      - count
      - hour
    FaceEnroll:
      type: object
      description: 人脸录入请求——校验 3 张图片。
      properties:
        employeeId:
          type: integer
          minimum: 1
        faces:
          type: array
          items:
            $ref: '#/components/schemas/FaceImageItem'
      required:
      - employeeId
      - faces
    FaceImageItem:
      type: object
      description: 单张人脸图片校验。
      properties:
        imageBase64:
          type: string
        faceType:
          type: string
        featureVector:
          type: array
          items:
            type: number
            format: double
        dimension:
          type: integer
      required:
      - faceType
      - imageBase64
    HealthCheck:
      type: object
      properties:
        service:
          type: string
          default: backend
        status:
          type: string
          default: ok
        stage:
          type: string
          default: skeleton
    Login:
      type: object
      description: 登录请求参数校验。
      properties:
        username:
          type: string
          maxLength: 150
        password:
          type: string
          maxLength: 128
      required:
      - password
