openapi: 3.0.3
info:
  title: Smart Factory Vision API
  version: 0.1.0
  description: API skeleton for Smart Factory Real-time Video Analysis and Safety
    Monitoring System.
paths:
  /api/ai-results/:
    get:
      operationId: api_ai_results_retrieve
      description: 返回 AI 结果模块当前占位状态，用于确认路由和模块边界存在。
      summary: AI 结果模块占位接口
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIResultPlaceholder'
              examples:
                AIResultsPlaceholder:
                  value:
                    code: 200
                    message: AI results module placeholder
                    data:
                      module: ai_results
                      status: placeholder
                    requestId: uuid
                  summary: AI results placeholder
          description: ''
  /api/ai-results/report/:
    post:
      operationId: api_ai_results_report_create
      description: AI 服务向后端上报单帧检测结果。当前接口校验 payload，并返回已接收结果数量。
      summary: 上报 AI 分析结果
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIResultReport'
            examples:
              AIReportRequest:
                value:
                  cameraId: 1
                  frameId: frame-001
                  timestamp: '2026-07-08T10:00:00+08:00'
                  results:
                  - type: PERSON_DETECTION
                    trackId: t-1
                    bbox:
                      x: 120
                      y: 80
                      w: 180
                      h: 320
                summary: AI report request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIResultReport'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIResultReport'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
  /api/ai/bootstrap/:
    get:
      operationId: api_ai_bootstrap_retrieve
      description: Aggregate cameras, zones, employees, and thresholds for ai-service
        startup cache.
      summary: AI service bootstrap
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/alerts/{alert_id}/detail/:
    get:
      operationId: api_alerts_detail_retrieve
      description: Return alert/event metadata plus lightweight replay evidence persisted
        in Event.payload.
      summary: Get alert detail with replay evidence
      parameters:
      - in: path
        name: alert_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertDetail'
          description: ''
        '404':
          description: No response body
  /api/alerts/{alert_id}/handle/:
    post:
      operationId: api_alerts_handle_create
      description: 更新告警状态（pending→processing→closed）。该接口需要 Bearer JWT 认证。
      summary: 处置告警
      parameters:
      - in: path
        name: alert_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertHandle'
            examples:
              处置请求:
                value:
                  status: processing
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AlertHandle'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AlertHandle'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
              examples:
                处置成功:
                  value:
                    code: 200
                    message: success
                    data:
                      id: 1
                      title: 危险区域入侵
                      eventType: ZONE_INTRUSION
                      severity: high
                      status: processing
                      cameraId: 1
                      cameraName: 一号车间入口
                      occurredAt: '2026-07-10T14:05:03+08:00'
                      description: ''
                    requestId: uuid
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
  /api/alerts/list/:
    get:
      operationId: api_alerts_list_list
      description: 查询告警中心列表，支持关键词（标题）、等级、状态、摄像头和时间范围筛选，支持分页。
      summary: 查询告警列表
      parameters:
      - in: query
        name: cameraId
        schema:
          type: integer
        description: 摄像头 ID
      - in: query
        name: endTime
        schema:
          type: string
        description: 结束时间，ISO 格式
      - in: query
        name: keyword
        schema:
          type: string
        description: 关键词，模糊搜索告警标题
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，正整数，默认 1
      - in: query
        name: pageSize
        schema:
          type: integer
        description: 每页数量，1~100，默认 20
      - in: query
        name: severity
        schema:
          type: string
        description: 等级：info/low/medium/high
      - in: query
        name: startTime
        schema:
          type: string
        description: 开始时间，ISO 格式
      - in: query
        name: status
        schema:
          type: string
        description: 状态：pending/processing/closed
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
              examples:
                告警列表响应:
                  value:
                  - code: 200
                    message: success
                    data:
                      total: 1
                      items:
                      - id: 1
                        title: 危险区域入侵
                        eventType: ZONE_INTRUSION
                        severity: high
                        status: pending
                        cameraId: 1
                        cameraName: 一号车间入口
                        occurredAt: '2026-07-10T14:05:03+08:00'
                        description: trackId t-1 进入 危险设备区
                    requestId: uuid
          description: ''
        '400':
          description: No response body
  /api/attendance/:
    get:
      operationId: api_attendance_retrieve
      description: 返回考勤模块当前占位状态，用于确认路由和模块边界存在。
      summary: 考勤模块占位接口
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendancePlaceholder'
              examples:
                AttendancePlaceholder:
                  value:
                    code: 200
                    message: Attendance module placeholder
                    data:
                      module: attendance
                      status: placeholder
                    requestId: uuid
                  summary: Attendance placeholder
          description: ''
  /api/auth/:
    get:
      operationId: api_auth_retrieve
      description: 返回用户模块当前占位状态，用于确认路由和模块边界存在。
      summary: 用户模块占位接口
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPlaceholder'
              examples:
                UsersPlaceholder:
                  value:
                    code: 200
                    message: Users module placeholder
                    data:
                      module: users
                      status: placeholder
                    requestId: uuid
                  summary: Users placeholder
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: 使用用户名和密码登录。认证成功后返回 Bearer JWT token 和用户信息。
      summary: 用户登录
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
            examples:
              LoginRequest:
                value:
                  username: admin
                  password: password
                summary: Login request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
        '401':
          description: No response body
        '403':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: JWT 无状态登出接口。后端返回成功，前端负责清理本地 token。该接口需要 Bearer JWT 认证。
      summary: 用户登出
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '401':
          description: No response body
  /api/auth/me/:
    get:
      operationId: api_auth_me_retrieve
      description: 返回当前 Bearer JWT 对应的用户信息。该接口需要 Bearer JWT 认证。
      summary: 获取当前用户
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                CurrentUser:
                  value:
                    code: 200
                    message: success
                    data:
                      id: 1
                      username: admin
                      role: admin
                    requestId: uuid
                  summary: Current user
          description: ''
        '401':
          description: No response body
  /api/cameras/:
    post:
      operationId: api_cameras_create
      description: 新增摄像头配置。code 编码不填则自动生成 CAM001 格式。该接口需要 Bearer JWT 认证。
      summary: 创建摄像头
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraCreate'
            examples:
              创建请求:
                value:
                  name: 一号车间入口
                  code: CAM001
                  streamUrl: rtmp://srs/live/1
                  processedStreamUrl: rtmp://srs/live/1_detected
                  location: 南侧
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CameraCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CameraCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
        '409':
          description: No response body
  /api/cameras/{camera_id}/:
    put:
      operationId: api_cameras_update
      description: 编辑摄像头配置，所有字段可选，不传则保持原值。该接口需要 Bearer JWT 认证。
      summary: 编辑摄像头
      parameters:
      - in: path
        name: camera_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraUpdate'
            examples:
              编辑请求:
                value:
                  name: 一号车间入口（更新）
                  location: 南侧门
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CameraUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CameraUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
        '404':
          description: No response body
        '409':
          description: No response body
  /api/cameras/{camera_id}/delete/:
    delete:
      operationId: api_cameras_delete_destroy
      parameters:
      - in: path
        name: camera_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/cameras/{camera_id}/stream/start/:
    post:
      operationId: api_cameras_stream_start_create
      parameters:
      - in: path
        name: camera_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/cameras/{camera_id}/stream/status/:
    get:
      operationId: api_cameras_stream_status_retrieve
      parameters:
      - in: path
        name: camera_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/cameras/{camera_id}/stream/stop/:
    post:
      operationId: api_cameras_stream_stop_create
      parameters:
      - in: path
        name: camera_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/cameras/{camera_id}/toggle/:
    post:
      operationId: api_cameras_toggle_create
      description: 切换摄像头的在线/离线/停用状态。该接口需要 Bearer JWT 认证。
      summary: 切换摄像头状态
      parameters:
      - in: path
        name: camera_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraToggle'
            examples:
              切换请求:
                value:
                  status: online
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CameraToggle'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CameraToggle'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
        '404':
          description: No response body
  /api/cameras/list/:
    get:
      operationId: api_cameras_list_list
      description: 查询摄像头配置，支持关键词搜索（名称/编码/位置）、状态筛选和分页。不传分页参数时返回全量（AI Service 调用兼容）。
      summary: 查询摄像头列表
      parameters:
      - in: query
        name: keyword
        schema:
          type: string
        description: 模糊匹配名称、编码或位置
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，正整数
      - in: query
        name: pageSize
        schema:
          type: integer
        description: 每页数量，正整数
      - in: query
        name: status
        schema:
          type: string
        description: 在线状态：online / offline / disabled
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CameraList'
              examples:
                摄像头列表响应:
                  value:
                  - code: 200
                    message: success
                    data:
                      total: 2
                      items:
                      - id: 1
                        name: 一号车间入口
                        code: CAM001
                        streamUrl: rtmp://srs/live/1
                        processedStreamUrl: rtmp://srs/live/1_detected
                        location: 一号车间南侧
                        status: online
                        enabled: true
                      - id: 2
                        name: 二号车间通道
                        code: CAM002
                        streamUrl: rtmp://srs/live/2
                        processedStreamUrl: ''
                        location: 二号车间东侧
                        status: offline
                        enabled: true
                    requestId: uuid
          description: ''
  /api/cameras/placeholder/:
    get:
      operationId: api_cameras_placeholder_retrieve
      description: 返回摄像头模块当前占位状态，用于确认路由和模块边界存在。
      summary: 摄像头模块占位接口
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraPlaceholder'
              examples:
                CamerasPlaceholder:
                  value:
                    code: 200
                    message: Cameras module placeholder
                    data:
                      module: cameras
                      status: placeholder
                    requestId: uuid
                  summary: Cameras placeholder
          description: ''
  /api/dashboard/summary/:
    get:
      operationId: api_dashboard_summary_retrieve
      description: Return database-backed operational counts, recent alerts, and today's
        hourly event trend.
      summary: Dashboard summary
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
          description: ''
  /api/employees/:
    get:
      operationId: api_employees_retrieve
      description: 返回员工模块当前占位状态，用于确认路由和模块边界存在。
      summary: 员工模块占位接口
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeePlaceholder'
              examples:
                EmployeesPlaceholder:
                  value:
                    code: 200
                    message: Employees module placeholder
                    data:
                      module: employees
                      status: placeholder
                    requestId: uuid
                  summary: Employees placeholder
          description: ''
    post:
      operationId: api_employees_create
      description: 新增员工档案。工号重复时返回 409。
      summary: 创建员工
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
            examples:
              CreateEmployeeRequest:
                value:
                  employeeNo: E001
                  name: 张三
                  department: 生产部
                  position: 操作员
                  phone: '13800000000'
                summary: Create employee request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
        '409':
          description: No response body
  /api/employees/{employee_id}/:
    put:
      operationId: api_employees_update
      description: 编辑员工档案，所有字段可选。修改成功通知 AI Service 刷新人脸库。该接口需要 Bearer JWT 认证。
      summary: 编辑员工
      parameters:
      - in: path
        name: employee_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
            examples:
              编辑请求:
                value:
                  name: 张三（更新）
                  department: 质检部
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
        '404':
          description: No response body
        '409':
          description: No response body
  /api/employees/{employee_id}/delete/:
    delete:
      operationId: api_employees_delete_destroy
      description: 删除员工档案，级联删除人脸特征和本地图片，通知 AI Service。该接口需要 Bearer JWT 认证。
      summary: 删除员工
      parameters:
      - in: path
        name: employee_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '404':
          description: No response body
  /api/employees/{employee_id}/faces/:
    get:
      operationId: api_employees_faces_retrieve
      description: 返回指定员工的所有已录入人脸特征记录。该接口需要 Bearer JWT 认证。
      summary: 查询员工人脸列表
      parameters:
      - in: path
        name: employee_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
        '404':
          description: No response body
  /api/employees/list/:
    get:
      operationId: api_employees_list_list
      description: 查询员工档案列表，支持按关键词模糊匹配姓名或工号。该接口需要 Bearer JWT 认证。
      summary: 查询员工列表
      parameters:
      - in: query
        name: department
        schema:
          type: string
        description: 部门筛选，可选
      - in: query
        name: keyword
        schema:
          type: string
        description: 关键词，模糊匹配姓名或工号，可选
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，正整数，默认 1
      - in: query
        name: pageSize
        schema:
          type: integer
        description: 每页数量，正整数，默认 20
      - in: query
        name: status
        schema:
          type: string
        description: 员工状态，可选：active/inactive
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeList'
              examples:
                EmployeeListResponse:
                  value:
                  - code: 200
                    message: success
                    data:
                      total: 1
                      items:
                      - id: 1
                        employeeNo: E001
                        name: 张三
                        department: 生产部
                        position: 操作员
                        phone: '13800000000'
                        status: active
                    requestId: uuid
                  summary: Employee list response
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
  /api/events/:
    get:
      operationId: api_events_retrieve
      description: 返回事件模块当前占位状态，用于确认路由和模块边界存在。
      summary: 事件模块占位接口
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPlaceholder'
              examples:
                EventsPlaceholder:
                  value:
                    code: 200
                    message: Events module placeholder
                    data:
                      module: events
                      status: placeholder
                    requestId: uuid
                  summary: Events placeholder
          description: ''
  /api/events/{event_id}/media/:
    post:
      operationId: api_events_media_create
      description: Accept keyframe/clip/manifest files for a formal event and persist
        browser-accessible media URLs.
      summary: Upload event replay media
      parameters:
      - in: path
        name: event_id
        schema:
          type: integer
        required: true
      tags:
      - api
