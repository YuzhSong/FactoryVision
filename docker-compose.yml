version: "3.9"

services:
  backend:
    image: python:3.14-slim
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "pip install -r requirements.txt && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:24-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

  ai-service:
    image: python:3.14-slim
    working_dir: /app/ai-service
    volumes:
      - ./:/app
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends ffmpeg && rm -rf /var/lib/apt/lists/* && pip install -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 9000 --reload"
    ports:
      - "9000:9000"
